<!-- Help Widget: Fixed position button with Modal -->
<button class="help-fab" (click)="openHelp()">
  <ion-icon name="help-circle"></ion-icon>
</button>

<!-- Help Modal -->
<ion-modal [isOpen]="isModalOpen" (didDismiss)="closeHelp()" [initialBreakpoint]="1" [breakpoints]="[0, 1]">
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Help - {{ pageTitle }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeHelp()">
            <ion-icon name="close" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="help-content" scrollY="true">
      <div class="help-container">
        <div class="help-intro">
          <ion-icon name="information-circle" color="primary" class="intro-icon"></ion-icon>
          <p>Detailed instructions on how to use this page:</p>
        </div>

        <div *ngFor="let item of helpItems; let i = index" class="help-card" [class.help-card-intro]="i === 0">
          <div class="help-title">
            <span class="step-badge" *ngIf="i > 0">{{ i }}</span>
            <ion-icon name="information-circle" color="primary" *ngIf="i === 0" class="title-icon"></ion-icon>
            <span>{{ item.question }}</span>
          </div>
          <div class="help-answer">{{ item.answer }}</div>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
